<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Grúas | Panel de Control</title>
    
    <!-- CORREGIDO: Ruta completa y oficial al CSS de Leaflet v1.9.4 
    <link rel="stylesheet" href="https://unpkg.com" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    
    <!-- Estilos Independientes -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Panel Lateral de Monitoreo -->
    <aside id="sidebar">
        <header>
            <h2>Módulo Grúas</h2>
            <p>Monitoreo en tiempo real</p>
        </header>
        <div id="lista-gruas">
            <p class="placeholder">Esperando señales GPS...</p>
        </div>
    </aside>

    <!-- Contenedor del Mapa -->
    <main id="map"></main>

    <!-- CORREGIDO: Ruta completa y oficial al archivo JavaScript de Leaflet (Crea la variable 'L') 
    <script src="https://unpkg.com" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Módulos de la Aplicación -->
    <!-- CORREGIDO: Eliminado 'defer' ya que type="module" lo gestiona de forma nativa en el orden correcto -->
    <script type="module" src="app.js"></script>
</body>
</html>
