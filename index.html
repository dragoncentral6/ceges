<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Grúas | Panel de Control</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <!-- Estilos Independientes -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Panel Lateral de Monitoreo -->
    <aside id="sidebar">
        <header>
            <h2>Módulo Grúas</h2>
            <p>Monitoreo en tiempo real</p>
        </header>
        <div id="lista-gruas">
            <p class="placeholder">Esperando señales GPS...</p>
        </div>
    </aside>

    <!-- Contenedor del Mapa -->
    <main id="map"></main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com"></script>
    
    <!-- Módulos de la Aplicación -->
    <script type="module" src="firebase-config.js" defer></script>
    <script type="module" src="app.js" defer></script>
</body>
</html>
